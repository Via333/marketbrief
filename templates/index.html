<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>PDF 文本编辑器</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f7;
        --fg: #1f2933;
        --accent: #2563eb;
        --border: #d1d5db;
        font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
      }

      h1 {
        margin-top: 0;
        font-size: 2rem;
        text-align: center;
      }

      p.description {
        text-align: center;
        color: #4b5563;
        margin-bottom: 2rem;
      }

      form {
        display: grid;
        gap: 1rem;
      }

      .panel {
        background: white;
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        padding: 1.75rem;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .upload-section input[type="file"] {
        padding: 0.5rem;
        border: 1px dashed var(--border);
        border-radius: 0.5rem;
        background: #f9fafb;
      }

      button {
        padding: 0.75rem 1.25rem;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        background: var(--accent);
        color: white;
        font-size: 1rem;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.35);
      }

      .alert {
        margin-bottom: 1rem;
        padding: 1rem 1.25rem;
        border-radius: 0.5rem;
        background: #fee2e2;
        color: #b91c1c;
        border: 1px solid #fecaca;
      }

      textarea {
        min-height: 420px;
        width: 100%;
        padding: 1rem;
        border-radius: 0.75rem;
        border: 1px solid var(--border);
        font-family: "Fira Code", "Courier New", monospace;
        line-height: 1.6;
        font-size: 0.95rem;
        resize: vertical;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
      }

      @media (max-width: 720px) {
        .container {
          padding: 1.5rem 1rem 3rem;
        }

        textarea {
          min-height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>PDF 文本编辑器</h1>
      <p class="description">
        上传 PDF 并提取文本，直接在浏览器中进行编辑，随后保存为新的 PDF 文件。
      </p>

      <div class="panel upload-section">
        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}
        <form action="{{ url_for('upload_pdf') }}" method="post" enctype="multipart/form-data">
          <label for="pdf_file">选择要上传的 PDF 文件：</label>
          <input type="file" id="pdf_file" name="pdf_file" accept="application/pdf" required />
          <button type="submit">上传并提取文本</button>
        </form>
      </div>

      {% if pdf_text is not none %}
      <div class="panel" style="margin-top: 2rem">
        <form action="{{ url_for('save_pdf') }}" method="post">
          <label for="pdf_text">编辑提取的文本：</label>
          <textarea id="pdf_text" name="pdf_text">{{ pdf_text }}</textarea>
          <div class="actions">
            <button type="submit">保存为新的 PDF</button>
          </div>
        </form>
      </div>
      {% endif %}
    </div>
  </body>
</html>
